specVersion: v0.1.0

package:
  name: velodrome-substreams
  version: v0.1.0
  description: Indexes Velodrome V2 pool creation, swaps, and liquidity events on Optimism. Outputs DatabaseChanges for SQL sink consumption.

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - velodrome.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ./target/wasm32-unknown-unknown/release/velodrome_substreams.wasm

network: optimism

modules:
  - name: map_factory_events
    kind: map
    initialBlock: 119142390
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:velodrome.types.v1.Pools

  - name: store_pools
    kind: store
    initialBlock: 119142390
    updatePolicy: set_if_not_exists
    valueType: string
    inputs:
      - map: map_factory_events

  - name: map_pool_events
    kind: map
    initialBlock: 119142390
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_pools
        mode: get
    output:
      type: proto:velodrome.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 119142390
    inputs:
      - map: map_factory_events
      - map: map_pool_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
