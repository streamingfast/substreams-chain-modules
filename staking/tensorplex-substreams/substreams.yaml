specVersion: v0.1.0

package:
  name: tensorplex-substreams
  version: v0.1.0
  description: Indexes Tensorplex staked TAO (stTAO) on Ethereum. Tracks user stakes, unstakes, and unstake requests.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/tensorplex-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - tensorplex.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/tensorplex_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 19219041
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:tensorplex.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 19219041
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
