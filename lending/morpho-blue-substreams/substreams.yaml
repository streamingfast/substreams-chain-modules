specVersion: v0.1.0

package:
  name: morpho-blue-substreams
  version: v0.1.0
  description: Indexes Morpho Blue lending markets on Ethereum mainnet. Covers CreateMarket, Supply, Borrow, Repay, Withdraw, Liquidate, and FlashLoan events. Outputs DatabaseChanges for SQL sink consumption.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/lending/morpho-blue-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - morpho_blue.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/morpho_blue_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 18883124
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:morpho_blue.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 18883124
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
