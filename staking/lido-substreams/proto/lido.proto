syntax = "proto3";

package lido.types.v1;

option go_package = "github.com/streamingfast/substreams-chain-modules/staking/lido-substreams/pb;pb";

message Deposit {
  string id = 1;
  string sender = 2;
  string amount_raw = 3;
  string referral = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message Transfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value_raw = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message EthDistribution {
  string id = 1;
  string report_timestamp = 2;
  string pre_cl_balance = 3;
  string post_cl_balance = 4;
  string withdrawals_withdrawn = 5;
  string el_rewards_withdrawn = 6;
  string post_buffered_ether = 7;
  string tx_hash = 8;
  uint64 log_index = 9;
  uint64 block_num = 10;
  uint64 timestamp = 11;
}

message OracleReport {
  string id = 1;
  string post_total_pooled_ether = 2;
  string pre_total_pooled_ether = 3;
  string time_elapsed = 4;
  string total_shares = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message WithdrawalRequest {
  string id = 1;
  string request_id = 2;
  string requestor = 3;
  string owner = 4;
  string amount_of_st_eth = 5;
  string amount_of_shares = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message WithdrawalClaim {
  string id = 1;
  string request_id = 2;
  string owner = 3;
  string receiver = 4;
  string amount_of_eth = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message Events {
  repeated Deposit deposits = 1;
  repeated Transfer transfers = 2;
  repeated EthDistribution eth_distributions = 3;
  repeated OracleReport oracle_reports = 4;
  repeated WithdrawalRequest withdrawal_requests = 5;
  repeated WithdrawalClaim withdrawal_claims = 6;
}
