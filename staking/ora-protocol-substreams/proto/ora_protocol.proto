syntax = "proto3";

package ora_protocol.types.v1;

message Events {
  repeated OraStakeRouterStake ora_stake_router_stakes = 1;
  repeated OraStakeRouterRequestWithdraw ora_stake_router_request_withdraws = 2;
  repeated OraStakeRouterClaimWithdraw ora_stake_router_claim_withdraws = 3;
}

message OraStakeRouterStake {
  string id = 1;
  string user = 2;
  string amount = 3;
  string pool = 4;
  string vault_id = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message OraStakeRouterRequestWithdraw {
  string id = 1;
  string user = 2;
  string amount = 3;
  string pool = 4;
  string vault_id = 5;
  string request_id = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message OraStakeRouterClaimWithdraw {
  string id = 1;
  string user = 2;
  string amount = 3;
  string pool = 4;
  string vault_id = 5;
  string last_request_id = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}
