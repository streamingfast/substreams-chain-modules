specVersion: v0.1.0

package:
  name: maple-finance-v2-substreams
  version: v0.1.0
  description: Indexes Maple Finance v2 factory contracts on Ethereum mainnet. Tracks PoolManager, MapleLoan, LoanManager, and Liquidator factory deployments (InstanceDeployed) plus migration helper events to catalog all protocol instances.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/lending/maple-finance-v2-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - maple.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/maple_finance_v2_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 16126990
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:maple.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 16126990
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
