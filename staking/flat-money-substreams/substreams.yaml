specVersion: v0.1.0

package:
  name: flat-money-substreams
  version: v0.1.0
  description: Indexes Flat Money on Base. Tracks UNIT deposits and withdrawals and delayed-order execution for the leveraged protocol.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/flat-money-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - flat_money.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/flat_money_substreams.wasm

network: base

modules:
  - name: map_events
    kind: map
    initialBlock: 12708434
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:flat_money.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 12708434
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
