specVersion: v0.1.0

package:
  name: m0-power-substreams
  version: v0.1.0
  description: Indexes M^0 Protocol on Ethereum. Tracks collateral updates on the Minter backing the M stablecoin.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/m0-power-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - m0_power.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/m0_power_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 19818447
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:m0_power.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 19818447
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
