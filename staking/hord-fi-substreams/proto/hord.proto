syntax = "proto3";

package hord.types.v1;

message Events {
  repeated HethTransfer heth_transfers = 1;
  repeated HethStakingStatsUpdated heth_staking_stats_updateds = 2;
}

message HethTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message HethStakingStatsUpdated {
  string id = 1;
  string new_rewards_amount = 2;
  string new_total_eth_balance_in_validators = 3;
  string new_total_execution_layer_rewards = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
