specVersion: v0.1.0

package:
  name: ora-protocol-substreams
  version: v0.1.0
  description: Indexes ORA staked ETH on Ethereum. Tracks stakes, withdrawal requests, and withdrawal claims.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/ora-protocol-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - ora_protocol.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/ora_protocol_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 20213880
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:ora_protocol.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 20213880
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
