specVersion: v0.1.0

package:
  name: aspida-substreams
  version: v0.1.0
  description: Indexes Aspida staked ETH (aETH) on Ethereum mainnet. Tracks aETH token transfers.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/aspida-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - aspida.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/aspida_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 19039168
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:aspida.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 19039168
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
