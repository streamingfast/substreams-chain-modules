specVersion: v0.1.0

package:
  name: origin-ether-substreams
  version: v0.1.0
  description: Indexes Origin Ether (OETH) vault on Ethereum mainnet. Tracks asset allocation, redemptions, withdrawal requests/claims, and yield distribution.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/origin-ether-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - origin_ether.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/origin_ether_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 17067001
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:origin_ether.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 17067001
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
