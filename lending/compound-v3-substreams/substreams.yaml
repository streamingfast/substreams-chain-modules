specVersion: v0.1.0

package:
  name: compound-v3-substreams
  version: v0.1.0
  description: Indexes Compound V3 (Comet) markets on Ethereum mainnet. Covers Supply, Withdraw, Transfer, AbsorbCollateral, AbsorbDebt, BuyCollateral, and PauseAction events across all Comet deployments. Outputs DatabaseChanges for SQL sink consumption.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/lending/compound-v3-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - compound_v3.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/compound_v3_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 15331590
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:compound_v3.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 15331590
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
