specVersion: v0.1.0

package:
  name: rari-vaults-substreams
  version: v0.1.0
  description: Indexes Rari Capital fund managers (DAI, USDC, ETH, Yield) on Ethereum. Tracks deposits and withdrawals across the vaults.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/rari-vaults-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - rari_vaults.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/rari_vaults_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 10908834
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:rari_vaults.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 10908834
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
