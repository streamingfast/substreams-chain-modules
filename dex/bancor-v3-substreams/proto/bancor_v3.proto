syntax = "proto3";

package bancor_v3.types.v1;

message Events {
  repeated BancorNetworkPoolCollectionAdded bancor_network_pool_collection_addeds = 1;
  repeated BancorNetworkTokensTraded bancor_network_tokens_tradeds = 2;
  repeated PoolCollectionTokensDeposited pool_collection_tokens_depositeds = 3;
  repeated PoolCollectionTokensWithdrawn pool_collection_tokens_withdrawns = 4;
  repeated PoolCollectionTotalLiquidityUpdated pool_collection_total_liquidity_updateds = 5;
  repeated PoolCollectionDefaultTradingFeePpmUpdated pool_collection_default_trading_fee_ppm_updateds = 6;
  repeated PoolCollectionTradingFeePpmUpdated pool_collection_trading_fee_ppm_updateds = 7;
  repeated PoolTokenFactoryPoolTokenCreated pool_token_factory_pool_token_createds = 8;
  repeated NetworkSettingsNetworkFeePpmUpdated network_settings_network_fee_ppm_updateds = 9;
  repeated NetworkSettingsWithdrawalFeePpmUpdated network_settings_withdrawal_fee_ppm_updateds = 10;
  repeated StandardRewardsProgramCreated standard_rewards_program_createds = 11;
  repeated StandardRewardsProgramTerminated standard_rewards_program_terminateds = 12;
  repeated StandardRewardsProgramEnabled standard_rewards_program_enableds = 13;
  repeated BntPoolTokensDeposited bnt_pool_tokens_depositeds = 14;
  repeated BntPoolTokensWithdrawn bnt_pool_tokens_withdrawns = 15;
  repeated BntPoolTotalLiquidityUpdated bnt_pool_total_liquidity_updateds = 16;
}

message BancorNetworkPoolCollectionAdded {
  string id = 1;
  string pool_type = 2;
  string pool_collection = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message BancorNetworkTokensTraded {
  string id = 1;
  string context_id = 2;
  string source_token = 3;
  string target_token = 4;
  string source_amount = 5;
  string target_amount = 6;
  string bnt_amount = 7;
  string target_fee_amount = 8;
  string bnt_fee_amount = 9;
  string trader = 10;
  string tx_hash = 11;
  uint64 log_index = 12;
  uint64 block_num = 13;
  uint64 timestamp = 14;
}

message PoolCollectionTokensDeposited {
  string id = 1;
  string pool = 2;
  string context_id = 3;
  string provider = 4;
  string token = 5;
  string token_amount = 6;
  string pool_token_amount = 7;
  string tx_hash = 8;
  uint64 log_index = 9;
  uint64 block_num = 10;
  uint64 timestamp = 11;
}

message PoolCollectionTokensWithdrawn {
  string id = 1;
  string pool = 2;
  string context_id = 3;
  string provider = 4;
  string token = 5;
  string token_amount = 6;
  string pool_token_amount = 7;
  string external_protection_base_token_amount = 8;
  string bnt_amount = 9;
  string withdrawal_fee_amount = 10;
  string tx_hash = 11;
  uint64 log_index = 12;
  uint64 block_num = 13;
  uint64 timestamp = 14;
}

message PoolCollectionTotalLiquidityUpdated {
  string id = 1;
  string pool = 2;
  string context_id = 3;
  string evt_pool = 4;
  string liquidity = 5;
  string staked_balance = 6;
  string pool_token_supply = 7;
  string tx_hash = 8;
  uint64 log_index = 9;
  uint64 block_num = 10;
  uint64 timestamp = 11;
}

message PoolCollectionDefaultTradingFeePpmUpdated {
  string id = 1;
  string pool = 2;
  string prev_fee_ppm = 3;
  string new_fee_ppm = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message PoolCollectionTradingFeePpmUpdated {
  string id = 1;
  string pool = 2;
  string evt_pool = 3;
  string prev_fee_ppm = 4;
  string new_fee_ppm = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message PoolTokenFactoryPoolTokenCreated {
  string id = 1;
  string pool_token = 2;
  string token = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message NetworkSettingsNetworkFeePpmUpdated {
  string id = 1;
  string prev_fee_ppm = 2;
  string new_fee_ppm = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message NetworkSettingsWithdrawalFeePpmUpdated {
  string id = 1;
  string prev_fee_ppm = 2;
  string new_fee_ppm = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message StandardRewardsProgramCreated {
  string id = 1;
  string pool = 2;
  string program_id = 3;
  string rewards_token = 4;
  string total_rewards = 5;
  string start_time = 6;
  string end_time = 7;
  string tx_hash = 8;
  uint64 log_index = 9;
  uint64 block_num = 10;
  uint64 timestamp = 11;
}

message StandardRewardsProgramTerminated {
  string id = 1;
  string pool = 2;
  string program_id = 3;
  string end_time = 4;
  string remaining_rewards = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message StandardRewardsProgramEnabled {
  string id = 1;
  string pool = 2;
  string program_id = 3;
  string status = 4;
  string remaining_rewards = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message BntPoolTokensDeposited {
  string id = 1;
  string context_id = 2;
  string provider = 3;
  string bnt_amount = 4;
  string pool_token_amount = 5;
  string vbnt_amount = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message BntPoolTokensWithdrawn {
  string id = 1;
  string context_id = 2;
  string provider = 3;
  string bnt_amount = 4;
  string pool_token_amount = 5;
  string vbnt_amount = 6;
  string withdrawal_fee_amount = 7;
  string tx_hash = 8;
  uint64 log_index = 9;
  uint64 block_num = 10;
  uint64 timestamp = 11;
}

message BntPoolTotalLiquidityUpdated {
  string id = 1;
  string context_id = 2;
  string liquidity = 3;
  string staked_balance = 4;
  string pool_token_supply = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}
