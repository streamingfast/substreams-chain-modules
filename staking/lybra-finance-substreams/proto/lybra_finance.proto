syntax = "proto3";

package lybra_finance.types.v1;

message Events {
  repeated LybraV1Mint lybra_v1_mints = 1;
  repeated LybraV1Burn lybra_v1_burns = 2;
  repeated LybraV1FeeDistribution lybra_v1_fee_distributions = 3;
}

message LybraV1Mint {
  string id = 1;
  string sponsor = 2;
  string on_behalf_of = 3;
  string amount = 4;
  string evt_timestamp = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message LybraV1Burn {
  string id = 1;
  string sponsor = 2;
  string on_behalf_of = 3;
  string amount = 4;
  string evt_timestamp = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message LybraV1FeeDistribution {
  string id = 1;
  string fee_address = 2;
  string fee_amount = 3;
  string evt_timestamp = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
