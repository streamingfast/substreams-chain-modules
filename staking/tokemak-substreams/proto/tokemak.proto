syntax = "proto3";

package tokemak.types.v1;

message Events {
  repeated ManagerPoolRegistered manager_pool_registereds = 1;
  repeated VaultWithdrawalRequested vault_withdrawal_requesteds = 2;
  repeated RewardsClaimed rewards_claimeds = 3;
}

message ManagerPoolRegistered {
  string id = 1;
  string pool = 2;
  string tx_hash = 3;
  uint64 log_index = 4;
  uint64 block_num = 5;
  uint64 timestamp = 6;
}

message VaultWithdrawalRequested {
  string id = 1;
  string pool = 2;
  string requestor = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message RewardsClaimed {
  string id = 1;
  string cycle = 2;
  string recipient = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
