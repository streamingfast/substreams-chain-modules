specVersion: v0.1.0

package:
  name: kernel-protocol-substreams
  version: v0.1.0
  description: Indexes Kernel Protocol staked assets (krETH, ksETH, kUSD) on Ethereum mainnet. Tracks deposits, redemptions, and mint/redeem fee changes.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/kernel-protocol-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - kernel.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/kernel_protocol_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 20112201
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:kernel.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 20112201
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
