specVersion: v0.1.0

package:
  name: geode-substreams
  version: v0.1.0
  description: Indexes Geode Finance staked AVAX (gAVAX) on Avalanche. Tracks gAVAX transfers and portal proposal approvals.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/geode-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - geode.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/geode_substreams.wasm

network: avalanche

modules:
  - name: map_events
    kind: map
    initialBlock: 16328316
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:geode.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 16328316
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
