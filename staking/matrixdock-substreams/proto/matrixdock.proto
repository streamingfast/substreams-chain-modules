syntax = "proto3";

package matrixdock.types.v1;

message Events {
  repeated StbtTransfer stbt_transfers = 1;
  repeated StbtInterestsDistributed stbt_interests_distributeds = 2;
}

message StbtTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message StbtInterestsDistributed {
  string id = 1;
  string interest = 2;
  string new_total_supply = 3;
  string interest_from_time = 4;
  string interest_to_time = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}
