syntax = "proto3";

package frax.types.v1;

message Events {
  repeated Deposit deposits = 1;
  repeated Withdraw withdrawals = 2;
  repeated NewRewardsCycle rewards_cycles = 3;
}

message Deposit {
  string id = 1;
  string caller = 2;
  string owner = 3;
  string assets = 4;
  string shares = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message Withdraw {
  string id = 1;
  string caller = 2;
  string receiver = 3;
  string owner = 4;
  string assets = 5;
  string shares = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message NewRewardsCycle {
  string id = 1;
  uint32 cycle_end = 2;
  string reward_amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}
