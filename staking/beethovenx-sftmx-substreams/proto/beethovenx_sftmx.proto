syntax = "proto3";

package beethovenx_sftmx.types.v1;

message Events {
  repeated FtmStakingLogDeposited ftm_staking_log_depositeds = 1;
  repeated FtmStakingLogUndelegated ftm_staking_log_undelegateds = 2;
  repeated FtmStakingLogWithdrawn ftm_staking_log_withdrawns = 3;
  repeated FtmStakingLogVaultWithdrawn ftm_staking_log_vault_withdrawns = 4;
}

message FtmStakingLogDeposited {
  string id = 1;
  string user = 2;
  string amount = 3;
  string ftmx_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message FtmStakingLogUndelegated {
  string id = 1;
  string user = 2;
  string wr_id = 3;
  string amount_ft_mx = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message FtmStakingLogWithdrawn {
  string id = 1;
  string user = 2;
  string wr_id = 3;
  string total_amount = 4;
  string bitmask_to_skip = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message FtmStakingLogVaultWithdrawn {
  string id = 1;
  string vault = 2;
  string tx_hash = 3;
  uint64 log_index = 4;
  uint64 block_num = 5;
  uint64 timestamp = 6;
}
