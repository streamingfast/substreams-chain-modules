specVersion: v0.1.0

package:
  name: kelp-dao-substreams
  version: v0.1.0
  description: Indexes Kelp DAO on Ethereum mainnet. Tracks asset and ETH deposits into the LRT deposit pool and withdrawal events from the withdrawal manager for rsETH liquid restaking.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/kelp-dao-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - kelp.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/kelp_dao_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 18758282
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:kelp.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 18758282
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
