specVersion: v0.1.0

package:
  name: dinero-pxeth-substreams
  version: v0.1.0
  description: Indexes Dinero pxETH (Pirex ETH) on Ethereum mainnet. Tracks deposits, validator deposits, redemptions, emergency withdrawals, and fee distributions.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/dinero-pxeth-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - dinero.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/dinero_pxeth_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 18765713
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:dinero.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 18765713
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
