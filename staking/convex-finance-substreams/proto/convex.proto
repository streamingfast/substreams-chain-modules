syntax = "proto3";

package convex.types.v1;

message Events {
  repeated Deposited deposited = 1;
  repeated Withdrawn withdrawn = 2;
}

message Deposited {
  string id = 1;
  string user = 2;
  uint64 pool_id = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message Withdrawn {
  string id = 1;
  string user = 2;
  uint64 pool_id = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
