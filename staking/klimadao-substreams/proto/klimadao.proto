syntax = "proto3";

package klimadao.types.v1;

message Events {
  repeated BctTransfer bct_transfers = 1;
  repeated BctRedeemFeePaid bct_redeem_fee_paids = 2;
}

message BctTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message BctRedeemFeePaid {
  string id = 1;
  string redeemer = 2;
  string fees = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}
