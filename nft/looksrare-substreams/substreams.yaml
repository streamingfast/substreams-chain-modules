specVersion: v0.1.0

package:
  name: looksrare-substreams
  version: v0.1.0
  description: Indexes LooksRare NFT marketplace on Ethereum mainnet. Covers TakerAsk, TakerBid, RoyaltyPayment, and order cancellation events. Outputs DatabaseChanges for SQL sink consumption.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/nft/looksrare-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - looksrare.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/looksrare_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 13885625
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:looksrare.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 13885625
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
