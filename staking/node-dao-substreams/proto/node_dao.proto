syntax = "proto3";

package node_dao.types.v1;

message Events {
  repeated LiquidStakingEthStake liquid_staking_eth_stakes = 1;
  repeated LiquidStakingEthUnstake liquid_staking_eth_unstakes = 2;
  repeated WithdrawalRequestWithdrawalsReceive withdrawal_request_withdrawals_receives = 3;
  repeated WithdrawalRequestLargeWithdrawalsRequest withdrawal_request_large_withdrawals_requests = 4;
  repeated WithdrawalRequestLargeWithdrawalsClaim withdrawal_request_large_withdrawals_claims = 5;
  repeated NethPoolEthStake neth_pool_eth_stakes = 6;
  repeated NethPoolEthUnstake neth_pool_eth_unstakes = 7;
  repeated NethPoolWithdrawalsRequest neth_pool_withdrawals_requests = 8;
  repeated NethPoolWithdrawalsClaimed neth_pool_withdrawals_claimeds = 9;
  repeated RestakingPoolEthStake restaking_pool_eth_stakes = 10;
  repeated RestakingPoolEthUnstake restaking_pool_eth_unstakes = 11;
  repeated RestakingPoolWithdrawalsRequest restaking_pool_withdrawals_requests = 12;
  repeated RestakingPoolWithdrawalsClaimed restaking_pool_withdrawals_claimeds = 13;
}

message LiquidStakingEthStake {
  string id = 1;
  string operator_id = 2;
  string from = 3;
  string amount = 4;
  string amount_out = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message LiquidStakingEthUnstake {
  string id = 1;
  string operator_id = 2;
  string target_operator_id = 3;
  string ender = 4;
  string amounts = 5;
  string amount_out = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message WithdrawalRequestWithdrawalsReceive {
  string id = 1;
  string operator_id = 2;
  string amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message WithdrawalRequestLargeWithdrawalsRequest {
  string id = 1;
  string operator_id = 2;
  string sender = 3;
  string total_neth_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message WithdrawalRequestLargeWithdrawalsClaim {
  string id = 1;
  string sender = 2;
  string total_pending_eth_amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message NethPoolEthStake {
  string id = 1;
  string staker = 2;
  string stake_amount = 3;
  string mint_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message NethPoolEthUnstake {
  string id = 1;
  string sender = 2;
  string unstake_amount = 3;
  string eth_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message NethPoolWithdrawalsRequest {
  string id = 1;
  string receiver = 2;
  string withdrawal_amount = 3;
  string block_number = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message NethPoolWithdrawalsClaimed {
  string id = 1;
  string receiver = 2;
  string request_id = 3;
  string claim_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message RestakingPoolEthStake {
  string id = 1;
  string staker = 2;
  string stake_amount = 3;
  string mint_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message RestakingPoolEthUnstake {
  string id = 1;
  string sender = 2;
  string unstake_amount = 3;
  string eth_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message RestakingPoolWithdrawalsRequest {
  string id = 1;
  string receiver = 2;
  string withdrawal_amount = 3;
  string block_number = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message RestakingPoolWithdrawalsClaimed {
  string id = 1;
  string receiver = 2;
  string request_id = 3;
  string claim_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
