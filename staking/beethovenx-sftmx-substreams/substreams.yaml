specVersion: v0.1.0

package:
  name: beethovenx-sftmx-substreams
  version: v0.1.0
  description: Indexes beethovenx-sftmx on fantom. TODO refine.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/beethovenx-sftmx-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - beethovenx_sftmx.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/beethovenx_sftmx_substreams.wasm

network: fantom

modules:
  - name: map_events
    kind: map
    initialBlock: 36518665
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:beethovenx_sftmx.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 36518665
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
