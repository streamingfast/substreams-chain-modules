syntax = "proto3";

package slisbnb.types.v1;

message Events {
  repeated ListaStakeManagerDeposit lista_stake_manager_deposits = 1;
  repeated ListaStakeManagerRequestWithdraw lista_stake_manager_request_withdraws = 2;
  repeated ListaStakeManagerClaimWithdrawal lista_stake_manager_claim_withdrawals = 3;
  repeated ListaStakeManagerRewardsCompounded lista_stake_manager_rewards_compoundeds = 4;
}

message ListaStakeManagerDeposit {
  string id = 1;
  string src = 2;
  string amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message ListaStakeManagerRequestWithdraw {
  string id = 1;
  string account = 2;
  string amount_in_slis_bnb = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message ListaStakeManagerClaimWithdrawal {
  string id = 1;
  string account = 2;
  string idx = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message ListaStakeManagerRewardsCompounded {
  string id = 1;
  string amount = 2;
  string tx_hash = 3;
  uint64 log_index = 4;
  uint64 block_num = 5;
  uint64 timestamp = 6;
}
