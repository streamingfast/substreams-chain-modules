specVersion: v0.1.0

package:
  name: inverse-finance-substreams
  version: v0.1.0
  description: Indexes Inverse Finance (Frontier) on Ethereum. Tracks cToken markets listed by the Comptroller and the mints, redeems, borrows, repays, and liquidations on each market, plus DOLA and the Stabilizer.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/lending/inverse-finance-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - inverse_finance.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/inverse_finance_substreams.wasm

network: mainnet

modules:
  - name: store_pools
    kind: store
    updatePolicy: set
    valueType: string
    initialBlock: 11915867
    inputs:
      - source: sf.ethereum.type.v2.Block

  - name: map_events
    kind: map
    initialBlock: 11915867
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_pools
    output:
      type: proto:inverse_finance.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 11915867
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
