syntax = "proto3";

package benqi_staked_avax.types.v1;

message Events {
  repeated SavaxSubmitted savax_submitteds = 1;
  repeated SavaxRedeem savax_redeems = 2;
  repeated SavaxAccrueRewards savax_accrue_rewardss = 3;
  repeated SavaxOldImplementationAccrueRewards savax_old_implementation_accrue_rewardss = 4;
}

message SavaxSubmitted {
  string id = 1;
  string user = 2;
  string avax_amount = 3;
  string share_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message SavaxRedeem {
  string id = 1;
  string user = 2;
  string unlock_requested_at = 3;
  string share_amount = 4;
  string avax_amount = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message SavaxAccrueRewards {
  string id = 1;
  string user_reward_amount = 2;
  string protocol_reward_amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message SavaxOldImplementationAccrueRewards {
  string id = 1;
  string value = 2;
  string tx_hash = 3;
  uint64 log_index = 4;
  uint64 block_num = 5;
  uint64 timestamp = 6;
}
