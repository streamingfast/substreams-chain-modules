specVersion: v0.1.0

package:
  name: prime-staked-eth-substreams
  version: v0.1.0
  description: Indexes Prime Staked ETH (primeETH) liquid restaking on Ethereum mainnet. Tracks supported-asset additions, asset deposits, asset swaps, and withdrawal claims.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/prime-staked-eth-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - prime_staked_eth.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/prime_staked_eth_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 19138974
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:prime_staked_eth.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 19138974
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
