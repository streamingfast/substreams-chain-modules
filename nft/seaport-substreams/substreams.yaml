specVersion: v0.1.0

package:
  name: seaport-substreams
  version: v0.1.0
  description: Indexes OpenSea's Seaport protocol on Ethereum mainnet. Tracks all OrderFulfilled events including offer and consideration items, enabling full NFT trade history with buyer, seller, tokens, and amounts.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/nft/seaport-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - seaport.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/seaport_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 14946565
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:seaport.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 14946565
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
