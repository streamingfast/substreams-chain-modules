syntax = "proto3";

package eigenpie.types.v1;

message Events {
  repeated EigenConfigAddedNewSupportedAsset eigen_config_added_new_supported_assets = 1;
  repeated EigenConfigReceiptTokenUpdated eigen_config_receipt_token_updateds = 2;
  repeated EigenStakingAssetDeposit eigen_staking_asset_deposits = 3;
}

message EigenConfigAddedNewSupportedAsset {
  string id = 1;
  string asset = 2;
  string receipt = 3;
  string deposit_limit = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message EigenConfigReceiptTokenUpdated {
  string id = 1;
  string asset = 2;
  string receipt = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message EigenStakingAssetDeposit {
  string id = 1;
  string depositor = 2;
  string asset = 3;
  string deposit_amount = 4;
  string referral = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}
