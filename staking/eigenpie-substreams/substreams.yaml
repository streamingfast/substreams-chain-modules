specVersion: v0.1.0

package:
  name: eigenpie-substreams
  version: v0.1.0
  description: Indexes Eigenpie liquid restaking (LRT) on Ethereum. Tracks supported-asset configuration and asset deposits into the restaking contract.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/eigenpie-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - eigenpie.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/eigenpie_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 19090400
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:eigenpie.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 19090400
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
