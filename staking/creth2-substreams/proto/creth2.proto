syntax = "proto3";

package creth2.types.v1;

message Events {
  repeated CreamTransfer cream_transfers = 1;
  repeated CrethTransfer creth_transfers = 2;
}

message CreamTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message CrethTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
