specVersion: v0.1.0

package:
  name: swell-liquid-staking-substreams
  version: v0.1.0
  description: Indexes Swell liquid staking (swETH) on Ethereum mainnet. Tracks ETH deposits, withdrawal requests/claims, and reprice/reward-rate updates.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/swell-liquid-staking-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - swell.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/swell_liquid_staking_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 17030752
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:swell.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 17030752
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
