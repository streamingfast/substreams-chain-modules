syntax = "proto3";

package deq.types.v1;

message Events {
  repeated StakedAvailTransfer staked_avail_transfers = 1;
}

message StakedAvailTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
