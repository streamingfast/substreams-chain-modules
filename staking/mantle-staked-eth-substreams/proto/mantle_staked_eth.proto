syntax = "proto3";

package mantle_staked_eth.types.v1;

message Events {
  repeated StakingStaked staking_stakeds = 1;
  repeated StakingUnstakeRequested staking_unstake_requesteds = 2;
  repeated StakingUnstakeRequestClaimed staking_unstake_request_claimeds = 3;
  repeated ReturnsAggregatorFeesCollected returns_aggregator_fees_collecteds = 4;
}

message StakingStaked {
  string id = 1;
  string staker = 2;
  string eth_amount = 3;
  string m_eth_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message StakingUnstakeRequested {
  string id = 1;
  string evt_id = 2;
  string staker = 3;
  string eth_amount = 4;
  string m_eth_locked = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message StakingUnstakeRequestClaimed {
  string id = 1;
  string evt_id = 2;
  string staker = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message ReturnsAggregatorFeesCollected {
  string id = 1;
  string amount = 2;
  string tx_hash = 3;
  uint64 log_index = 4;
  uint64 block_num = 5;
  uint64 timestamp = 6;
}
