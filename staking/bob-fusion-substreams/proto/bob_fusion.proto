syntax = "proto3";

package bob_fusion.types.v1;

message Events {
  repeated FusionLockDeposit fusion_lock_deposits = 1;
  repeated FusionLockWithdrawToL1 fusion_lock_withdraw_to_l1s = 2;
  repeated FusionLockWithdrawToL2 fusion_lock_withdraw_to_l2s = 3;
}

message FusionLockDeposit {
  string id = 1;
  string deposit_owner = 2;
  string token = 3;
  string amount = 4;
  string deposit_time = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message FusionLockWithdrawToL1 {
  string id = 1;
  string owner = 2;
  string token = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message FusionLockWithdrawToL2 {
  string id = 1;
  string owner = 2;
  string receiver = 3;
  string l1_token = 4;
  string l2_token = 5;
  string amount = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}
