specVersion: v0.1.0

package:
  name: euler-finance-substreams
  version: v0.1.0
  description: Indexes Euler Finance lending on Ethereum. Tracks deposits, borrows, repays, withdrawals, liquidations, market activations, and EUL staking.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/euler-finance-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - euler_finance.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/euler_finance_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 13711759
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:euler_finance.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 13711759
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
