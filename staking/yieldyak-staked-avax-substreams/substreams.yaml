specVersion: v0.1.0

package:
  name: yieldyak-staked-avax-substreams
  version: v0.1.0
  description: Indexes yieldyak-staked-avax on avalanche. TODO refine.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/yieldyak-staked-avax-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - yieldyak_staked_avax.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/yieldyak_staked_avax_substreams.wasm

network: avalanche

modules:
  - name: map_events
    kind: map
    initialBlock: 16328316
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:yieldyak_staked_avax.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 16328316
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
