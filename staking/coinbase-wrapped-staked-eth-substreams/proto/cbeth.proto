syntax = "proto3";

package cbeth.types.v1;

message Events {
  repeated Mint mints = 1;
  repeated Burn burns = 2;
  repeated ExchangeRateUpdated exchange_rate_updates = 3;
}

message Mint {
  string id = 1;
  string minter = 2;
  string to = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message Burn {
  string id = 1;
  string burner = 2;
  string amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message ExchangeRateUpdated {
  string id = 1;
  string oracle = 2;
  string new_exchange_rate = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}
