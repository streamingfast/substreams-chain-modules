specVersion: v0.1.0

package:
  name: slisbnb-substreams
  version: v0.1.0
  description: Indexes Lista DAO slisBNB liquid staking on BNB Chain. Tracks deposits, withdrawal requests, claims, and reward compounding.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/slisbnb-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - slisbnb.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/slisbnb_substreams.wasm

network: bsc

modules:
  - name: map_events
    kind: map
    initialBlock: 29524859
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:slisbnb.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 29524859
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
