syntax = "proto3";

package hyperlock_finance.types.v1;

message Events {
  repeated ThrusterPointNftIncreaseLiquidity thruster_point_nft_increase_liquiditys = 1;
  repeated ThrusterPointNftDecreaseLiquidity thruster_point_nft_decrease_liquiditys = 2;
  repeated Erc20PointsDepositStake erc20_points_deposit_stakes = 3;
  repeated Erc20PointsDepositUnstake erc20_points_deposit_unstakes = 4;
  repeated Erc721PointsDepositDeposit erc721_points_deposit_deposits = 5;
  repeated Erc721PointsDepositWithdraw erc721_points_deposit_withdraws = 6;
}

message ThrusterPointNftIncreaseLiquidity {
  string id = 1;
  string token_id = 2;
  string liquidity = 3;
  string amount0 = 4;
  string amount1 = 5;
  string tick_lower = 6;
  string tick_upper = 7;
  string pool = 8;
  string tx_hash = 9;
  uint64 log_index = 10;
  uint64 block_num = 11;
  uint64 timestamp = 12;
}

message ThrusterPointNftDecreaseLiquidity {
  string id = 1;
  string token_id = 2;
  string liquidity = 3;
  string amount0 = 4;
  string amount1 = 5;
  string tick_lower = 6;
  string tick_upper = 7;
  string pool = 8;
  string tx_hash = 9;
  uint64 log_index = 10;
  uint64 block_num = 11;
  uint64 timestamp = 12;
}

message Erc20PointsDepositStake {
  string id = 1;
  string lp_token = 2;
  string sender = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message Erc20PointsDepositUnstake {
  string id = 1;
  string lp_token = 2;
  string sender = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message Erc721PointsDepositDeposit {
  string id = 1;
  string pool = 2;
  string sender = 3;
  string token_id = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message Erc721PointsDepositWithdraw {
  string id = 1;
  string pool = 2;
  string sender = 3;
  string token_id = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
