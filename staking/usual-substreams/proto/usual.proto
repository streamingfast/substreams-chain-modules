syntax = "proto3";

package usual.types.v1;

message Events {
  repeated UsycTransfer usyc_transfers = 1;
  repeated UsycFeeProcessed usyc_fee_processeds = 2;
}

message UsycTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message UsycFeeProcessed {
  string id = 1;
  string recipient = 2;
  string fee = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}
