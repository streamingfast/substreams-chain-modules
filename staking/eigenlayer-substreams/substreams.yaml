specVersion: v0.1.0

package:
  name: eigenlayer-substreams
  version: v0.1.0
  description: Indexes EigenLayer restaking protocol on Ethereum mainnet. Covers LST deposits into strategies, withdrawal queuing and completion, native ETH restaking via EigenPods, and pod deployments. Outputs DatabaseChanges for SQL sink consumption.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/eigenlayer-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - eigenlayer.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/eigenlayer_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 17445564
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:eigenlayer.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 17445564
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
