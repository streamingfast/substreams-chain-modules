specVersion: v0.1.0

package:
  name: paxos-gold-substreams
  version: v0.1.0
  description: Indexes paxos-gold on mainnet. TODO refine.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/paxos-gold-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - paxos_gold.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/paxos_gold_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 8426430
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:paxos_gold.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 8426430
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
