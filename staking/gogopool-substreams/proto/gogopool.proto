syntax = "proto3";

package gogopool.types.v1;

message Events {
  repeated GgavaxDeposit ggavax_deposits = 1;
  repeated GgavaxDepositedFromStaking ggavax_deposited_from_stakings = 2;
  repeated GgavaxWithdraw ggavax_withdraws = 3;
  repeated GgavaxWithdrawnForStaking ggavax_withdrawn_for_stakings = 4;
  repeated GgavaxNewRewardsCycle ggavax_new_rewards_cycles = 5;
}

message GgavaxDeposit {
  string id = 1;
  string caller = 2;
  string owner = 3;
  string assets = 4;
  string shares = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message GgavaxDepositedFromStaking {
  string id = 1;
  string caller = 2;
  string base_amt = 3;
  string rewards_amt = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message GgavaxWithdraw {
  string id = 1;
  string caller = 2;
  string receiver = 3;
  string owner = 4;
  string assets = 5;
  string shares = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message GgavaxWithdrawnForStaking {
  string id = 1;
  string caller = 2;
  string assets = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message GgavaxNewRewardsCycle {
  string id = 1;
  string cycle_end = 2;
  string rewards_amt = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}
