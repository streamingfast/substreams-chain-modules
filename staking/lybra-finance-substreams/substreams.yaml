specVersion: v0.1.0

package:
  name: lybra-finance-substreams
  version: v0.1.0
  description: Indexes Lybra Finance V1 on Ethereum. Tracks eUSD mints, burns, and fee distribution for the LST-backed stablecoin.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/lybra-finance-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - lybra_finance.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/lybra_finance_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 17115039
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:lybra_finance.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 17115039
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
