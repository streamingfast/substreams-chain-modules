specVersion: v0.1.0

package:
  name: bancor-v3-substreams
  version: v0.1.0
  description: Indexes bancor-v3 on ethereum. TODO refine.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/dex/bancor-v3-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - bancor_v3.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/bancor_v3_substreams.wasm

network: mainnet

modules:
  - name: store_pools
    kind: store
    updatePolicy: set
    valueType: string
    initialBlock: 14609379
    inputs:
      - source: sf.ethereum.type.v2.Block

  - name: map_events
    kind: map
    initialBlock: 14609379
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_pools
    output:
      type: proto:bancor_v3.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 14609379
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
