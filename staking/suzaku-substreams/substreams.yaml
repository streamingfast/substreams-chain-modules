specVersion: v0.1.0

package:
  name: suzaku-substreams
  version: v0.1.0
  description: Indexes Suzaku restaking on Avalanche. Tracks collateral entities created by the CollateralFactory and deposits/withdrawals on each dynamically-created Collateral contract.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/suzaku-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - suzaku.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/suzaku_substreams.wasm

network: avalanche

modules:
  - name: store_pools
    kind: store
    updatePolicy: set
    valueType: string
    initialBlock: 51180393
    inputs:
      - source: sf.ethereum.type.v2.Block

  - name: map_events
    kind: map
    initialBlock: 51180393
    inputs:
      - source: sf.ethereum.type.v2.Block
      - store: store_pools
    output:
      type: proto:suzaku.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 51180393
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
