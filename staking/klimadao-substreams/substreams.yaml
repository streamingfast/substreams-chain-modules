specVersion: v0.1.0

package:
  name: klimadao-substreams
  version: v0.1.0
  description: Indexes klimadao on matic. TODO refine.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/klimadao-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - klimadao.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/klimadao_substreams.wasm

network: matic

modules:
  - name: map_events
    kind: map
    initialBlock: 54379303
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:klimadao.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 54379303
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
