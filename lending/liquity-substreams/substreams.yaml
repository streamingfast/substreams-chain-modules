specVersion: v0.1.0

package:
  name: liquity-substreams
  version: v0.1.0
  description: Indexes the Liquity CDP lending protocol on Ethereum mainnet. Covers trove lifecycle (open, adjust, close, liquidate), stability pool deposits and ETH gains, redemptions, and pool balance updates. Outputs DatabaseChanges for SQL sink consumption.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/lending/liquity-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - liquity.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/liquity_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 12178551
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:liquity.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 12178551
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
