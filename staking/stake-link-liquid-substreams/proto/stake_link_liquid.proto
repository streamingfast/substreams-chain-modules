syntax = "proto3";

package stake_link_liquid.types.v1;

message Events {
  repeated StlinkTransfer stlink_transfers = 1;
  repeated StlinkUpdateStrategyRewards stlink_update_strategy_rewardss = 2;
  repeated PriorityPoolDeposit priority_pool_deposits = 3;
  repeated PriorityPoolDepositTokens priority_pool_deposit_tokenss = 4;
  repeated PriorityPoolUnqueueTokens priority_pool_unqueue_tokenss = 5;
  repeated PriorityPoolWithdraw priority_pool_withdraws = 6;
}

message StlinkTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message StlinkUpdateStrategyRewards {
  string id = 1;
  string account = 2;
  string total_staked = 3;
  string rewards_amount = 4;
  string total_fees = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message PriorityPoolDeposit {
  string id = 1;
  string account = 2;
  string pool_amount = 3;
  string queue_amount = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message PriorityPoolDepositTokens {
  string id = 1;
  string unused_tokens_amount = 2;
  string queued_tokens_amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message PriorityPoolUnqueueTokens {
  string id = 1;
  string account = 2;
  string amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}

message PriorityPoolWithdraw {
  string id = 1;
  string account = 2;
  string amount = 3;
  string tx_hash = 4;
  uint64 log_index = 5;
  uint64 block_num = 6;
  uint64 timestamp = 7;
}
