specVersion: v0.1.0

package:
  name: rocket-pool-substreams
  version: v0.1.0
  description: Indexes Rocket Pool's rETH token on Ethereum mainnet. Tracks ETH deposits, rETH minting, and rETH burning events to monitor all liquid staking inflows and outflows across the protocol.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/rocket-pool-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - rocketpool.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/rocket_pool_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 13325233
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:rocketpool.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 13325233
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
