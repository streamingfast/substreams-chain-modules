specVersion: v0.1.0

package:
  name: frax-ether-staking-substreams
  version: v0.1.1
  description: Indexes Frax Finance's sfrxETH (staked frxETH) vault on Ethereum mainnet. Tracks deposits, withdrawals, and reward cycle events to monitor ETH liquid staking activity and yield distribution.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/frax-ether-staking-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - frax.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/frax_ether_staking_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 15686046
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:frax.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 15686046
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
