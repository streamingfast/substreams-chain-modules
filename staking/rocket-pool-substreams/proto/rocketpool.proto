syntax = "proto3";

package rocketpool.types.v1;

message Events {
  repeated EtherDeposited ether_deposited = 1;
  repeated TokensMinted tokens_minted = 2;
  repeated TokensBurned tokens_burned = 3;
}

message EtherDeposited {
  string id = 1;
  string from = 2;
  string amount = 3;
  uint64 time = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message TokensMinted {
  string id = 1;
  string to = 2;
  string amount = 3;
  string eth_amount = 4;
  uint64 time = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message TokensBurned {
  string id = 1;
  string from = 2;
  string amount = 3;
  string eth_amount = 4;
  uint64 time = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}
