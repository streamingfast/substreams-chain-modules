specVersion: v0.1.0

package:
  name: bob-fusion-substreams
  version: v0.1.0
  description: Indexes BOB Fusion lock on Ethereum. Tracks deposits and L1/L2 withdrawals in the Fusion staking campaign.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/bob-fusion-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - bob_fusion.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/bob_fusion_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 19520422
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:bob_fusion.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 19520422
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
