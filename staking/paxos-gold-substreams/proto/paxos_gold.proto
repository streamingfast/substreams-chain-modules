syntax = "proto3";

package paxos_gold.types.v1;

message Events {
  repeated PaxgTransfer paxg_transfers = 1;
  repeated PaxgFeeCollected paxg_fee_collecteds = 2;
}

message PaxgTransfer {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message PaxgFeeCollected {
  string id = 1;
  string from = 2;
  string to = 3;
  string value = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}
