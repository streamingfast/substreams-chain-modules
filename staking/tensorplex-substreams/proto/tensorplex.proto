syntax = "proto3";

package tensorplex.types.v1;

message Events {
  repeated PlxtaoUserStake plxtao_user_stakes = 1;
  repeated PlxtaoUserUnstake plxtao_user_unstakes = 2;
  repeated PlxtaoUserUnstakeRequested plxtao_user_unstake_requesteds = 3;
}

message PlxtaoUserStake {
  string id = 1;
  string user = 2;
  string stake_timestamp = 3;
  string in_tao_amt = 4;
  string wst_amount = 5;
  string tx_hash = 6;
  uint64 log_index = 7;
  uint64 block_num = 8;
  uint64 timestamp = 9;
}

message PlxtaoUserUnstake {
  string id = 1;
  string user = 2;
  string idx = 3;
  string unstake_timestamp = 4;
  string tx_hash = 5;
  uint64 log_index = 6;
  uint64 block_num = 7;
  uint64 timestamp = 8;
}

message PlxtaoUserUnstakeRequested {
  string id = 1;
  string user = 2;
  string idx = 3;
  string request_timestamp = 4;
  string wst_amount = 5;
  string out_tao_amt = 6;
  string wrapped_token = 7;
  string tx_hash = 8;
  uint64 log_index = 9;
  uint64 block_num = 10;
  uint64 timestamp = 11;
}
