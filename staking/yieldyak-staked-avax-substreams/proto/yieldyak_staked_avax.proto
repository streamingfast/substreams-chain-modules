syntax = "proto3";

package yieldyak_staked_avax.types.v1;

message Events {
  repeated GavaxTransferSingle gavax_transfer_singles = 1;
  repeated GavaxTransferBatch gavax_transfer_batchs = 2;
}

message GavaxTransferSingle {
  string id = 1;
  string operator = 2;
  string from = 3;
  string to = 4;
  string evt_id = 5;
  string value = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}

message GavaxTransferBatch {
  string id = 1;
  string operator = 2;
  string from = 3;
  string to = 4;
  string ids = 5;
  string values = 6;
  string tx_hash = 7;
  uint64 log_index = 8;
  uint64 block_num = 9;
  uint64 timestamp = 10;
}
