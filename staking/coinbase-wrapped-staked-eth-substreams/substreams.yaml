specVersion: v0.1.0

package:
  name: coinbase-wrapped-staked-eth-substreams
  version: v0.1.0
  description: Indexes Coinbase Wrapped Staked ETH (cbETH) on Ethereum mainnet. Tracks mints, burns, and exchange rate updates for Coinbase's liquid staking token.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/coinbase-wrapped-staked-eth-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - cbeth.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/coinbase_wrapped_staked_eth_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 14133762
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:cbeth.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 14133762
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
