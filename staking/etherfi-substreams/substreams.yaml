specVersion: v0.1.0

package:
  name: etherfi-substreams
  version: v0.1.0
  description: Indexes ether.fi liquid restaking protocol on Ethereum mainnet. Covers early adopter deposits, LiquidityPool deposits and withdrawals, rebase events, validator lifecycle, and node withdrawal events. Outputs DatabaseChanges for SQL sink consumption.
  url: https://github.com/streamingfast/substreams-chain-modules/tree/main/staking/etherfi-substreams

imports:
  database: https://github.com/streamingfast/substreams-sink-database-changes/releases/download/v4.0.0/substreams-sink-database-changes-v4.0.0.spkg

protobuf:
  files:
    - etherfi.proto
  importPaths:
    - ./proto
  excludePaths:
    - sf/substreams
    - google

binaries:
  default:
    type: wasm/rust-v1
    file: ../../target/wasm32-unknown-unknown/release/etherfi_substreams.wasm

network: mainnet

modules:
  - name: map_events
    kind: map
    initialBlock: 16722425
    inputs:
      - source: sf.ethereum.type.v2.Block
    output:
      type: proto:etherfi.types.v1.Events

  - name: db_out
    kind: map
    initialBlock: 16722425
    inputs:
      - map: map_events
    output:
      type: proto:sf.substreams.sink.database.v1.DatabaseChanges
